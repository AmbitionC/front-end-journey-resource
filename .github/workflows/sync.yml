name: sync-content
on:
  push:
    branches: [master]
    # 采集器投递的原始未归档内容（_inbox/）不是发布内容，faas 同步也会忽略非模块路径；
    # 这里跳过纯 _inbox 改动，避免触发空跑同步。含 interview/ 或 knowledge/ 变更的提交仍会触发。
    paths-ignore:
      - '_inbox/**'
  pull_request:
    paths:
      - '.codex/image-resync.txt'
  workflow_dispatch:
    inputs:
      before_sha:
        description: Git SHA before the content range to sync
        required: true
        type: string
      after_sha:
        description: Git SHA after the content range to sync
        required: true
        type: string

permissions:
  contents: read
  statuses: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Publish pending content sync status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state="pending" \
            -f context="content-sync" \
            -f description="Content sync running" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate manifest
        run: |
          npm install
          npm run validate:tree
      - name: Trigger faas sync
        env:
          FAAS_SYNC_URL: ${{ secrets.FAAS_SYNC_URL }}
          FAAS_SYNC_SECRET: ${{ secrets.FAAS_SYNC_SECRET }}
          BEFORE: ${{ github.event_name == 'workflow_dispatch' && inputs.before_sha || (github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before) }}
          AFTER: ${{ github.event_name == 'workflow_dispatch' && inputs.after_sha || (github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha) }}
        run: |
          curl -sS -X POST "$FAAS_SYNC_URL" \
            -H "x-sync-secret: $FAAS_SYNC_SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"beforeSha\":\"$BEFORE\",\"afterSha\":\"$AFTER\"}" \
            -w "\nHTTP %{http_code}\n" | tee /tmp/resp.txt
          grep -q '"success":true' /tmp/resp.txt
          grep -q '"errors":\[\]' /tmp/resp.txt

      - name: Publish content sync status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          state="$JOB_STATUS"
          if [ "$state" = "cancelled" ]; then state="error"; fi
          gh api --method POST "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state="$state" \
            -f context="content-sync" \
            -f description="Content sync $state" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
